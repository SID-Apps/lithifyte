<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lost in space — Lithifyte</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#020b1a">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/page.css">
<style>
  body{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px}
  .code{font:600 13px "IBM Plex Mono",monospace; letter-spacing:.18em; text-transform:uppercase; color:#38bdf8; margin:0 0 14px}
  h1{font:800 clamp(34px,7vw,64px)/1.05 "Syne",sans-serif; letter-spacing:-.02em; margin:0 0 14px}
  p{color:#8fb0d0; max-width:34em; margin:0 0 28px}
  .btns{display:flex; gap:12px; flex-wrap:wrap; justify-content:center}
  .btns a{display:inline-flex; align-items:center; gap:8px; border-radius:12px; padding:13px 20px;
    font:600 14px "IBM Plex Mono",monospace; color:#e8f1ff; border:1px solid rgba(56,189,248,.35); background:rgba(4,18,36,.5)}
  .btns a.primary{color:#fff; background:linear-gradient(135deg, rgba(14,165,233,.95), rgba(29,78,216,.95)); border-color:rgba(125,211,252,.6)}
  .btns a:hover{text-decoration:none; filter:brightness(1.08)}
</style>
</head>
<body>
  <p class="code">// 404 — drifted off the map</p>
  <h1>This node doesn't exist.</h1>
  <p>The page you were flying toward isn't on the money map. It may have moved, or the address has a typo.</p>
  <div class="btns">
    <a class="primary" href="/">← Back to the map</a>
    <a href="https://app.lithifyte.com/demo">Explore the sample</a>
  </div>
</body>
</html>
