# Lithifyte access — magic-link identity (email only)
# Deploy:  cd www/workers && wrangler deploy
# Host:    access.lithifyte.com  (Worker custom domain or route)

name = "lithifyte-access"
main = "access.js"
compatibility_date = "2026-07-16"
workers_dev = true

[[kv_namespaces]]
binding = "WAITLIST"
id = "e9a5e75ebb2a4867b090fce4c52735a1"
preview_id = "c5a7f69e525d4135b18f750bca1fba07"

[assets]
directory = "./public"
binding = "ASSETS"
# Worker handles API + decides when to serve assets
run_worker_first = true

[vars]
APP_ORIGIN = "https://app.lithifyte.com"
LANDING = "https://lithifyte.com"
ACCESS_ORIGIN = "https://access.lithifyte.com"
COOKIE_DOMAIN = ".lithifyte.com"
# Show magic link in UI until email provider is wired:
DEV_RETURN_LINK = "1"
